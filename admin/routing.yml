admin.home:
  path: '/'
  methods: ['GET']
  defaults:
    _controller: 'Simp\Pindrop\Modules\admin\src\Controller\AdminController::home'
  requirements:
    _permission: ['user', 'moderator', 'admin', 'super_admin', 'guest']
admin.dashboard:
  path: '/admin'
  methods: ['GET']
  defaults:
    _controller: 'Simp\Pindrop\Modules\admin\src\Controller\AdminController::dashboard'
  requirements:
    _permission: ['admin', 'super_admin']

admin.settings:
  path: '/admin/settings'
  methods: ['GET']
  defaults:
    _controller: 'Simp\Pindrop\Modules\admin\src\Controller\AdminController::settings'
  requirements:
    _permission: ['admin', 'super_admin']

admin.users:
  path: '/admin/users'
  methods: ['GET']
  defaults:
    _controller: 'Simp\Pindrop\Modules\admin\src\Controller\AdminController::users'
  requirements:
    _permission: ['admin', 'super_admin']

