    _controller: 'Simp\Pindrop\Modules\admin\src\Controller\AdminController::createUser'
  requirements:
    _permission: ['admin', 'super_admin']

admin.users.edit:
  path: '/admin/users/[user_id:int]/edit'
  methods: ['GET', 'POST']
  defaults:
    _controller: 'Simp\Pindrop\Modules\admin\src\Controller\AdminController::editUser'
  requirements:
    _permission: ['admin', 'super_admin']

